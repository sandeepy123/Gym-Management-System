{% extends "base.html" %}

{% block page_title %}Create New Membership Plan{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px;">
    <form method="POST" action="{{ url_for('members.add_plan') }}">
        <div class="form-group">
            <label for="name">Plan Name (e.g., Monthly Special, Annual Pro)</label>
            <input type="text" id="name" name="name" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="duration_days">Duration (in days)</label>
            <input type="number" id="duration_days" name="duration_days" class="form-control" required min="1">
            <small style="color: var(--text-muted);">E.g., 30 for monthly, 365 for annual.</small>
        </div>
        
        <div class="form-group">
            <label for="price">Price (₹)</label>
            <input type="number" id="price" name="price" class="form-control" step="0.01" required min="0">
        </div>
        
        <div style="margin-top: 2rem;">
            <button type="submit" class="btn btn-primary" style="margin-right: 1rem;">Save Plan</button>
            <a href="{{ url_for('members.list_members') }}" class="btn" style="background: var(--bg-color); border: 1px solid #E5E7EB; color: var(--text-main);">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
