{% extends "base.html" %}

{% block page_title %}Add New Member (Admission){% endblock %}

{% block content %}
<div class="card" style="max-width: 600px;">
    <form method="POST" action="{{ url_for('members.add_member') }}">
        <div class="form-group">
            <label for="full_name">Full Name</label>
            <input type="text" id="full_name" name="full_name" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="text" id="phone" name="phone" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control">
        </div>
        
        <div class="form-group">
            <label for="plan_id">Select Plan</label>
            <select id="plan_id" name="plan_id" class="form-control" required>
                <option value="">-- Select a Plan --</option>
                {% for plan in plans %}
                <option value="{{ plan.id }}">{{ plan.name }} - ₹{{ plan.price }} ({{ plan.duration_days }} days)</option>
                {% endfor %}
            </select>
            <small style="color: var(--text-muted); display: block; margin-top: 0.5rem;">
                Don't see a suitable plan? <a href="{{ url_for('members.add_plan') }}" style="color: var(--primary);">Create a new plan</a>.
            </small>
        </div>
        
        <div style="margin-top: 2rem;">
            <button type="submit" class="btn btn-primary" style="margin-right: 1rem;">Register Member</button>
            <a href="{{ url_for('members.list_members') }}" class="btn" style="background: var(--bg-color); border: 1px solid #E5E7EB; color: var(--text-main);">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
