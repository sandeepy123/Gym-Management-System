{% extends "base.html" %}

{% block content %}
<div class="auth-container" style="width: 100%; max-width: 400px; margin: auto;">
    <div class="card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2 style="color: var(--primary); font-size: 1.75rem; margin-bottom: 0.5rem;">Register Staff</h2>
            <p style="color: var(--text-muted);">Create a new access account</p>
        </div>
        
        <form action="{{ url_for('auth.signup') }}" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required minlength="6">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
        </form>
        
        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem;">
            <span style="color: var(--text-muted);">Already have an account?</span>
            <a href="{{ url_for('auth.login') }}" style="color: var(--primary); text-decoration: none; font-weight: 500;">Login</a>
        </div>
    </div>
</div>
{% endblock %}
